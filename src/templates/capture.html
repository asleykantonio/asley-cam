<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asley-cam photobooth</title>
    <style>

        body {
            font-family: couriers, monospace;
            text-align: center;
            padding: 50px;
            font-size: 20px;
        }

        video {
            width: 100%;
            max-width: 640px;
            border: 4px solid #333;
            border-radius: 8px;
            background-color: #000;
            transform: scaleX(-1);
        }

        div {
            border: 4px solid #333;
            border-radius: 8px;
        }

    </style>
</head>
<body>
    <h1>got your three poses ready?</h1>

    <button id="begin-btn" onclick="startCapture()">click me to capture some photos!</button>

    <video id="webcam" autoplay playsinline></video>

    <div id="strip"></div>

    <script>
        let webcamStream = null;
        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then((stream) => {
                webcamStream = stream;
                video.srcObject = stream;
            })
            .catch((error) => {
                console.error("Error accessing the webcam: ", error);
                alert("Could not access webcam. Please ensure permissions are granted.");
            });

        function startCapture() {
            document.getElementById('begin-btn').disabled = true;

            // release webcam so OpenCV can grab it
            if (webcamStream) {
                webcamStream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }

            // wait a moment for OpenCV to take over, then stream
            setTimeout(() => {
                const source = new EventSource("/stream");

                source.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    const img = document.createElement("img");
                    img.src = data.url;
                    document.getElementById("strip").appendChild(img);
                };

                source.onerror = function() {
                    source.close();
                    // restart the webcam preview when done
                    navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                        .then((stream) => {
                            webcamStream = stream;
                            video.srcObject = stream;
                        });
                };
            }, 500); // 500ms gives OpenCV time to grab the camera
        }
    </script>
</body>
</html>
