<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asley-cam photobooth</title>
    <style>

        body {
            font-family: courier, monospace;
            text-align: center;
            padding: 50px;
            font-size: 20px;
        }

        #webcam {
            width: 100%;
            max-width: 640px;
            border: 4px solid #333;
            border-radius: 8px;
            background-color: #000;
            transform: scaleX(-1);
        }

        #strip img {
            width: 100%;
            max-width: 640px;
            margin: 10px auto;
            display: block;
            border: 4px solid #333;
            border-radius: 8px;
        }

        #begin-btn:disabled {
            cursor: not-allowed;
        }

    </style>
</head>
<body>
    <h1>got your three poses ready?</h1>
    <p>click the button below to capture some photos!</p>

    <img id="webcam" src="/video_feed">

    <div id="strip"></div>

    <button id="begin-btn" disabled onclick="startCapture()">begin</button>

    <script>
        window.addEventListener("load", function() {
            document.getElementById('begin-btn').disabled = false;
        });
        
        function startCapture() {
            document.getElementById('begin-btn').disabled = true;

            const source = new EventSource("/stream");

            source.onmessage = function(event) {
                const data = JSON.parse(event.data);
                const img = document.createElement("img");
                img.src = data.url;
                document.getElementById("strip").appendChild(img);
            };

            source.onerror = function() {
                source.close();
            };
        }
    </script>
</body>
</html>
